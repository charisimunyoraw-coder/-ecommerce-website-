<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Store</a>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="text-center mb-5">Contact Us</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Send us a Message</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
<input type="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark">Send</button>
                </form>
            </div>

            <div class="col-md-6">
                <h3>Contact Info</h3>
                <p><strong>Email:</strong> info@store.com</p>
                <p><strong>Phone:</strong> <a href="tel:+263717607709">+263 71 760 7709</a></p>
<p><strong>WhatsApp:</strong> <a href="https://wa.me/263717607709">+263 71 760 7709</a></p>
                <p><strong>Address:</strong> shop 17 Sterling House Jason Moyo St, Bulawayo, BYO 10001</p>
                <p><strong>Hours:</strong> Mon-Fri 9AM-6PM, Sat 10AM-5PM</p>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Sneaker & iPhone Store</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
